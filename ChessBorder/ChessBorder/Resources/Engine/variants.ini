# Border Chess - 10×10 standard chess with a one-square border on all sides.
# Used by Fairy-Stockfish (GPL v3). See https://github.com/fairy-stockfish/Fairy-Stockfish

[chessborder:chess]
maxRank = 10
maxFile = 10
# Pawns sit one rank inside the border (white rank 3, black rank 8 = relative
# rank 3), and promote on the outer ring (rank 10 / rank 1). The inherited chess
# template assumes relative rank 2 / last rank, so without these overrides the
# engine offers pawn double-steps from the wrong rank and promotes two ranks too
# early — diverging from the client rules engine (see shared corpus).
doubleStepRank = 3
doubleStepRankMin = 3
promotionRank = 10
startFen = ........../.rnbqkbnr./.pppppppp./......../......../......../......../.PPPPPPPP./.RNBQKBNR./.......... w KQkq - 0 1
