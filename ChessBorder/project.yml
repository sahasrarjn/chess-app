name: ChessBorder
options:
  bundleIdPrefix: com.sahasraranjan
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  xcodeVersion: "16.0"
settings:
  SWIFT_VERSION: "5.10"
targets:
  ChessBorder:
    type: application
    platform: iOS
    sources:
      - path: ChessBorder
        excludes:
          - Resources/Pieces
          - Resources/Engine/fairy-stockfish
          - Resources/Engine/fairy-stockfish-ios
          - Resources/Engine/variants.ini
      - path: ChessBorder/Resources/Engine/fairy-stockfish-ios
        buildPhase:
          copyFiles:
            destination: resources
            subpath: Engine
      - path: ChessBorder/Resources/Engine/variants.ini
        buildPhase:
          copyFiles:
            destination: resources
            subpath: Engine
    resources:
      - path: ChessBorder/Assets.xcassets
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.sahasraranjan.chessborder
      DEVELOPMENT_TEAM: K89NSAWKXN
      CODE_SIGN_STYLE: Automatic
      MARKETING_VERSION: "1.0.0"
      CURRENT_PROJECT_VERSION: "1"
      TARGETED_DEVICE_FAMILY: "1"
      INFOPLIST_KEY_UILaunchScreen_Generation: YES
      INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
      INFOPLIST_KEY_CFBundleDisplayName: Chess Border
    info:
      path: ChessBorder/Info.plist
      properties:
        CFBundleDisplayName: Chess Border
        UILaunchScreen: {}
        EngineServerURL: https://chess-engine.sahasraranjan.workers.dev

  ChessBorderMac:
    type: application
    platform: macOS
    sources:
      - path: ChessBorder
        excludes:
          - Resources/Pieces
          - Resources/Engine/fairy-stockfish
          - Resources/Engine/variants.ini
      - path: ChessBorder/Resources/Engine/fairy-stockfish
        buildPhase:
          copyFiles:
            destination: resources
            subpath: Engine
      - path: ChessBorder/Resources/Engine/variants.ini
        buildPhase:
          copyFiles:
            destination: resources
            subpath: Engine
    resources:
      - path: ChessBorder/Assets.xcassets
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.sahasraranjan.chessborder.mac
      PRODUCT_NAME: Chess Border
      DEVELOPMENT_TEAM: K89NSAWKXN
      CODE_SIGN_STYLE: Automatic
      MARKETING_VERSION: "1.0.0"
      CURRENT_PROJECT_VERSION: "1"
      INFOPLIST_KEY_CFBundleDisplayName: Chess Border
      GENERATE_INFOPLIST_FILE: YES
      ENABLE_TESTABILITY: YES
      CODE_SIGN_ENTITLEMENTS: ChessBorder/ChessBorder.entitlements
    info:
      path: ChessBorder/Info-mac.plist
      properties:
        CFBundleDisplayName: Chess Border
        LSMinimumSystemVersion: "14.0"

  ChessBorderTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: ChessBorderTests
    dependencies:
      - target: ChessBorderMac
    settings:
      GENERATE_INFOPLIST_FILE: YES
      PRODUCT_BUNDLE_IDENTIFIER: com.sahasraranjan.chessborder.tests
      TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Chess Border.app/Contents/MacOS/Chess Border"
      BUNDLE_LOADER: "$(TEST_HOST)"

schemes:
  ChessBorder:
    build:
      targets:
        ChessBorder: all
    run:
      config: Debug
  ChessBorderMac:
    build:
      targets:
        ChessBorderMac: all
    run:
      config: Debug
    test:
      targets:
        - ChessBorderTests
      config: Debug
