AWSTemplateFormatVersion: "2010-09-09"
Description: Chess Border engine — App Runner (HTTPS included, dev-sized 0.25 vCPU / 1 GB, ~$5-8/mo).

Parameters:
  ImageUri:
    Type: String
    Description: ECR image URI including tag
  ApiKey:
    Type: String
    NoEcho: true
    Default: ""
    Description: Required in production (X-API-Key header). Only the Cloudflare worker should know this value.
  AlertEmail:
    Type: String
    Default: ""
    Description: Optional email for CloudWatch alarm notifications (5xx spike).

Conditions:
  HasAlertEmail: !Not [!Equals [!Ref AlertEmail, ""]]

Resources:
  AppRunnerECRAccessRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: build.apprunner.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSAppRunnerServicePolicyForECRAccess

  AppRunnerInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: tasks.apprunner.amazonaws.com
            Action: sts:AssumeRole

  AppRunnerService:
    Type: AWS::AppRunner::Service
    Properties:
      ServiceName: chess-border-engine
      SourceConfiguration:
        AuthenticationConfiguration:
          AccessRoleArn: !GetAtt AppRunnerECRAccessRole.Arn
        AutoDeploymentsEnabled: false
        ImageRepository:
          ImageIdentifier: !Ref ImageUri
          ImageRepositoryType: ECR
          ImageConfiguration:
            Port: "8080"
            RuntimeEnvironmentVariables:
              - Name: API_KEY
                Value: !Ref ApiKey
      InstanceConfiguration:
        Cpu: "0.25 vCPU"
        Memory: "1 GB"
        InstanceRoleArn: !GetAtt AppRunnerInstanceRole.Arn
      HealthCheckConfiguration:
        Protocol: HTTP
        Path: /health
        Interval: 10
        Timeout: 5
        HealthyThreshold: 1
        UnhealthyThreshold: 3

  AlertTopic:
    Type: AWS::SNS::Topic
    Condition: HasAlertEmail
    Properties:
      TopicName: chess-border-engine-alerts

  AlertSubscription:
    Type: AWS::SNS::Subscription
    Condition: HasAlertEmail
    Properties:
      TopicArn: !Ref AlertTopic
      Protocol: email
      Endpoint: !Ref AlertEmail

  High5xxAlarm:
    Type: AWS::CloudWatch::Alarm
    Condition: HasAlertEmail
    Properties:
      AlarmName: !Sub "${AWS::StackName}-5xx"
      AlarmDescription: App Runner 5xx responses exceeded threshold
      Namespace: AWS/AppRunner
      MetricName: 5xxStatusResponses
      Dimensions:
        - Name: ServiceName
          Value: chess-border-engine
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 20
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopic

Outputs:
  ServiceUrl:
    Description: HTTPS URL for the iPhone app Engine server field
    Value: !Sub "https://${AppRunnerService.ServiceUrl}"
  ServiceArn:
    Value: !GetAtt AppRunnerService.ServiceArn
