AWSTemplateFormatVersion: "2010-09-09"
Description: Chess Border engine — App Runner (HTTPS included, dev-sized 0.25 vCPU / 1 GB, ~$5-8/mo).

Parameters:
  ImageUri:
    Type: String
    Description: ECR image URI including tag
  ApiKey:
    Type: String
    NoEcho: true
    Default: ""
    Description: Optional API key (X-API-Key header). Leave empty to disable.

Resources:
  AppRunnerECRAccessRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: build.apprunner.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSAppRunnerServicePolicyForECRAccess

  AppRunnerInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: tasks.apprunner.amazonaws.com
            Action: sts:AssumeRole

  AppRunnerService:
    Type: AWS::AppRunner::Service
    Properties:
      ServiceName: chess-border-engine
      SourceConfiguration:
        AuthenticationConfiguration:
          AccessRoleArn: !GetAtt AppRunnerECRAccessRole.Arn
        AutoDeploymentsEnabled: false
        ImageRepository:
          ImageIdentifier: !Ref ImageUri
          ImageRepositoryType: ECR
          ImageConfiguration:
            Port: "8080"
            RuntimeEnvironmentVariables:
              - Name: API_KEY
                Value: !Ref ApiKey
      InstanceConfiguration:
        Cpu: "0.25 vCPU"
        Memory: "1 GB"
        InstanceRoleArn: !GetAtt AppRunnerInstanceRole.Arn
      HealthCheckConfiguration:
        Protocol: HTTP
        Path: /health
        Interval: 10
        Timeout: 5
        HealthyThreshold: 1
        UnhealthyThreshold: 3

Outputs:
  ServiceUrl:
    Description: HTTPS URL for the iPhone app Engine server field
    Value: !Sub "https://${AppRunnerService.ServiceUrl}"
  ServiceArn:
    Value: !GetAtt AppRunnerService.ServiceArn
