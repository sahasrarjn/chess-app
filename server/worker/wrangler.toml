name = "chess-engine"
main = "src/index.ts"
compatibility_date = "2026-05-01"
workers_dev = true

# borderchess.org DNS → CloudFront (see docs/DOMAIN.md).
# API paths /v1/move and /health are proxied by CloudFront to workers.dev origin.

[observability]
enabled = true

[vars]
PUBLIC_MAX_MOVETIME_MS = "5000"

# Secrets (wrangler secret put):
#   ENGINE_ORIGIN - App Runner URL from server/aws/deploy.sh
#   API_KEY       - same key as AWS stack (required for production)
